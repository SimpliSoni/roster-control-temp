@if (isOpen) {
  <div class="modal-overlay" (click)="close.emit()" role="none">
    <div 
      class="modal modal-md" 
      (click)="$event.stopPropagation()"
      role="dialog" 
      aria-modal="true" 
      aria-labelledby="bulk-modal-title"
    >
      <div class="modal-header">
        <span class="modal-title" id="bulk-modal-title">Bulk Add Shifts</span>
        <button 
          class="btn-ghost btn btn-sm" 
          [disabled]="isLoading" 
          (click)="close.emit()" 
          aria-label="Close dialog"
        >
          <i class="ti ti-x" aria-hidden="true"></i>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-row g2">
          <div class="form-group">
            <label for="bulk-shift">Shift</label>
            <select id="bulk-shift" [(ngModel)]="bulkShift">
              @for (def of shiftDefs | keyvalue; track def.key) {
                <option [value]="def.key">{{ def.value.label }} {{ def.value.time ? '(' + def.value.time + ')' : '' }}</option>
              }
            </select>
          </div>
        </div>
        <div class="form-row g2">
          <div class="form-group">
            <label for="bulk-from">From date</label>
            <input type="date" id="bulk-from" [(ngModel)]="bulkFrom" />
          </div>
          <div class="form-group">
            <label for="bulk-to">To date</label>
            <input type="date" id="bulk-to" [(ngModel)]="bulkTo" />
          </div>
        </div>

      </div>
      <div class="modal-footer">
        <button class="btn" [disabled]="isLoading" (click)="close.emit()">Cancel</button>
        <button class="btn btn-primary" [disabled]="isLoading" (click)="applyBulkAdd()">
          @if (isLoading) {
            <i class="ti ti-loader spin-anim" aria-hidden="true"></i> Applying...
          } @else {
            <i class="ti ti-check" aria-hidden="true"></i> Apply
          }
        </button>
      </div>
    </div>
  </div>
}
