@if (isOpen) {
  <div class="modal-overlay" (click)="close.emit()" role="none">
    <div 
      class="modal modal-sm" 
      (click)="$event.stopPropagation()"
      role="dialog" 
      aria-modal="true" 
      aria-labelledby="ms-modal-title"
    >
      <div class="modal-header">
        <span class="modal-title" id="ms-modal-title">{{ title }}</span>
        <button class="btn-ghost btn btn-sm" (click)="close.emit()" aria-label="Close dialog">
          <i class="ti ti-x" aria-hidden="true"></i>
        </button>
      </div>
      <div class="modal-body">
        <!-- Summary Box -->
        <div class="summary-box">
          <div class="summary-grid">
            <span class="summary-label">Employee:</span>
            <strong class="summary-value">{{ empName }}</strong>
            
            <span class="summary-label">Designation:</span>
            <span class="summary-value">{{ empRole }}</span>
            
            <span class="summary-label">Duration:</span>
            <span class="summary-value">{{ duration }}</span>
          </div>
        </div>

        <div class="section-title">Select Shift</div>
        
        <div class="shift-options-list">
          @for (def of shiftDefs | keyvalue; track def.key) {
            <label 
              class="shift-option-label"
              [class.selected]="selectedShiftKey === def.key"
            >
              <input
                type="radio"
                name="mshift"
                [value]="def.key"
                [(ngModel)]="selectedShiftKey"
              />
              <div class="shift-option-details">
                <div class="shift-option-name">{{ def.value.label }}</div>
                <div class="shift-option-time">{{ def.value.time }}</div>
              </div>
              <div
                class="shift-option-color-preview"
                [style.background]="def.value.bg"
              ></div>
            </label>
          }
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" (click)="close.emit()">Close</button>
        <button class="btn btn-primary" (click)="submit.emit(selectedShiftKey)">Continue</button>
      </div>
    </div>
  </div>
}
